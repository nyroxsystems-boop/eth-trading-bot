name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Validate all Python syntax
        run: |
          echo "🔍 Checking all Python files..."
          python -c "
          import ast, os, sys
          errors = 0
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ('node_modules', '__pycache__', '.git', 'venv', 'env', 'dist')]
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          with open(path) as fh:
                              ast.parse(fh.read())
                      except SyntaxError as e:
                          print(f'❌ {path}: {e}')
                          errors += 1
          if errors:
              print(f'\n❌ {errors} files have syntax errors')
              sys.exit(1)
          else:
              print('✅ All Python files compile clean')
          "

      - name: Validate core module imports
        env:
          PAPER_MODE: "true"
        run: |
          python -c "
          import importlib
          modules = [
              'bot.config', 'bot.state', 'bot.signals', 'bot.risk',
              'bot.executor', 'bot.brain', 'bot.experience', 'bot.swarm',
              'bot.shield', 'bot.pair_scanner', 'bot.ml_collector',
              'bot.multi_tf', 'bot.market_intel', 'bot.stocks',
              'bot.futures_executor', 'bot.backtester',
              'bot.strategies.funding_arb', 'bot.strategies.stat_arb',
              'bot.strategies.momentum_v2', 'bot.strategies.liquidation_hunter',
              'bot.strategies.allocator',
          ]
          failed = 0
          for mod in modules:
              try:
                  importlib.import_module(mod)
                  print(f'✅ {mod}')
              except Exception as e:
                  print(f'❌ {mod}: {e}')
                  failed += 1
          if failed:
              import sys
              sys.exit(1)
          print('✅ All modules import successfully')
          "

      - name: Run test suite (26 tests)
        env:
          PAPER_MODE: "true"
        run: |
          python -m pytest tests/test_core.py -v --tb=short

  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build User Dashboard
        working-directory: dashboard
        env:
          CI: "true"
          VITE_API_URL: ''
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          rm -rf node_modules package-lock.json
          npm install
          npm run build
          test -f dist/index.html && echo "✅ Dashboard built successfully" || exit 1
