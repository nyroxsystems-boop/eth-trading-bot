name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ethbot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt 2>/dev/null || true
          pip install pytest pytest-cov
      
      - name: Run unit tests
        env:
          JWT_SECRET: test_secret_key_for_ci_pipeline_12345
          ENCRYPTION_KEY: ""
          ADMIN_PASSWORD: testadmin123
          USER_PASSWORD: testuser1234
          DASHBOARD_SECRET: test_secret
        run: |
          python -m pytest tests/unit/ -v --tb=short -x
      
      - name: Run integration tests (API endpoints)
        env:
          JWT_SECRET: test_secret_key_for_ci_pipeline_12345
          ENCRYPTION_KEY: ""
          ADMIN_PASSWORD: testadmin123
          USER_PASSWORD: testuser1234
          DASHBOARD_SECRET: test_secret
          CORS_ORIGINS: "*"
        run: |
          python -m pytest tests/integration/test_api_endpoints.py -v --tb=short -x
      
      - name: Run integration tests (pipeline)
        env:
          JWT_SECRET: test_secret_key_for_ci_pipeline_12345
        run: |
          python -m pytest tests/integration/test_pipeline.py -v --tb=short -x
      
      - name: Lint check (syntax only)
        run: |
          python -m py_compile dashboard_api.py
          python -m py_compile auto_apply.py
          python -m py_compile continuous_backtester.py
          python -m py_compile src/ml/strategy_backtester.py
          python -m py_compile config.py
          python -m py_compile auth_deps.py
          python -m py_compile data_collector.py
          python -m py_compile edge_validator.py
          python -m py_compile signal_engine_v2.py
          python -m py_compile risk_manager_v2.py
          python -m py_compile state.py
          echo "✅ All critical files compile clean"

  build-dashboard:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: test
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - dashboard: dashboard
            name: User Dashboard
          - dashboard: admin-dashboard
            name: Admin Dashboard
          - dashboard: strategy-monitor
            name: Strategy Monitor
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      # Clean install — no cache. Stale node_modules with missing compiled
      # binaries caused the 27-second build crash. 10s slower but 100% stable.
      - name: Clean Install and Build
        working-directory: ${{ matrix.dashboard }}
        env:
          CI: "true"
          VITE_API_URL: ''
          NODE_OPTIONS: '--max-old-space-size=4096'
        run: |
          rm -rf node_modules package-lock.json
          npm install
          npm run build
          test -f dist/index.html && echo "✅ ${{ matrix.name }} built successfully" || exit 1

