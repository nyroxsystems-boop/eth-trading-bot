name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ethbot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt 2>/dev/null || true
          pip install pytest pytest-cov
      
      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/ethbot_test
          JWT_SECRET: test_secret_key_for_ci
        run: |
          python -m pytest tests/unit/ -v --tb=short -x
      
      - name: Lint check (syntax only)
        run: |
          python -m py_compile dashboard_api.py
          python -m py_compile auto_apply.py
          python -m py_compile continuous_backtester.py
          python -m py_compile src/ml/strategy_backtester.py
          echo "✅ All critical files compile clean"

  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      
      - name: Install & Build
        working-directory: dashboard
        env:
          VITE_API_URL: ''
        run: |
          npm ci
          npm run build
      
      - name: Verify build output
        run: |
          test -f dashboard/dist/index.html && echo "✅ Dashboard build successful" || exit 1
