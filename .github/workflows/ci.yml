name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ethbot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt 2>/dev/null || true
          pip install pytest pytest-cov
      
      - name: Run unit tests
        env:
          JWT_SECRET: test_secret_key_for_ci_pipeline_12345
          ENCRYPTION_KEY: ""
          ADMIN_PASSWORD: testadmin123
          USER_PASSWORD: testuser1234
          DASHBOARD_SECRET: test_secret
        run: |
          python -m pytest tests/unit/ -v --tb=short -x
      
      - name: Run integration tests (API endpoints)
        env:
          JWT_SECRET: test_secret_key_for_ci_pipeline_12345
          ENCRYPTION_KEY: ""
          ADMIN_PASSWORD: testadmin123
          USER_PASSWORD: testuser1234
          DASHBOARD_SECRET: test_secret
          CORS_ORIGINS: "*"
        run: |
          python -m pytest tests/integration/test_api_endpoints.py -v --tb=short -x
      
      - name: Run integration tests (pipeline)
        env:
          JWT_SECRET: test_secret_key_for_ci_pipeline_12345
        run: |
          python -m pytest tests/integration/test_pipeline.py -v --tb=short -x
      
      - name: Lint check (syntax only)
        run: |
          python -m py_compile dashboard_api.py
          python -m py_compile auto_apply.py
          python -m py_compile continuous_backtester.py
          python -m py_compile src/ml/strategy_backtester.py
          python -m py_compile config.py
          python -m py_compile auth_deps.py
          python -m py_compile data_collector.py
          python -m py_compile edge_validator.py
          python -m py_compile signal_engine_v2.py
          python -m py_compile risk_manager_v2.py
          echo "✅ All critical files compile clean"

  build-dashboards:
    name: Build All Dashboards
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Build User Dashboard
        working-directory: dashboard
        env:
          VITE_API_URL: ''
        run: |
          npm install
          npm run build
          test -f dist/index.html && echo "✅ User Dashboard built" || exit 1
      
      - name: Build Admin Dashboard
        working-directory: admin-dashboard
        env:
          VITE_API_URL: ''
        run: |
          npm install
          npm run build
          test -f dist/index.html && echo "✅ Admin Dashboard built" || exit 1
      
      - name: Build Strategy Monitor
        working-directory: strategy-monitor
        env:
          VITE_API_URL: ''
        run: |
          npm install
          npm run build
          test -f dist/index.html && echo "✅ Strategy Monitor built" || exit 1
